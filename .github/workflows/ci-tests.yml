name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # --- Train trigger likelihood model(s) ---
      - name: Train trigger likelihood models (logistic)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"        # allow seeding if logs are empty in CI
        run: |
          python -m src.ml.train_trigger_model --days 14 --interval hour
          echo "Models in ./models:"
          ls -lah models || true

      # --- Assert logistic artifacts exist (fail early if missing) ---
      - name: Assert logistic artifacts exist
        if: ${{ success() }}
        run: |
          test -f models/trigger_likelihood_v0.joblib    || (echo "missing logistic model" && exit 1)
          test -f models/trigger_likelihood_v0.meta.json || (echo "missing logistic meta"  && exit 1)

      # OPTIONAL: compute per-origin thresholds (commented out for simplicity)
      # - name: Compute per-origin thresholds
      #   if: ${{ success() }}
      #   env:
      #     PYTHONPATH: ${{ github.workspace }}
      #     DEMO_MODE: "true"
      #   run: |
      #     python -c "from src.ml.thresholds import fit_and_write_thresholds; fit_and_write_thresholds(days=7, interval='hour'); print('Wrote models/per_origin_thresholds.json')"
      #     ls -lah models || true
      #     test -f models/per_origin_thresholds.json || true

      # Upload logistic artifacts (only)
      - name: Upload logistic model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
          if-no-files-found: error
          retention-days: 14

      # --- Demo summary & artifacts (read-only, post-tests) ---
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      - name: Build demo summary (read-only)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"
          MPLBACKEND: "Agg"
          DEMO_RICH_SCORES: "true"
          TL_DRIFT_Z_THRESHOLD: "0.5"         # ⚡ lower threshold for demo sensitivity
          TL_DRIFT_PER_FEATURE_PENALTY: "0.1" # ⚡ bigger penalty so effect is visible
          METRICS_MIN_LABELS: "5"
          METRICS_LOOKBACK_HOURS: "72"
          METRICS_MIN_LABELS_ORIGIN: "3"
        run: python scripts/mw_demo_summary.py

      - name: Show artifacts (debug)
        if: ${{ success() }}
        run: |
          echo "Artifacts in repo root:"
          ls -lah
          echo "Artifacts in ./artifacts:"
          ls -lah artifacts || true
          test -f artifacts/demo_summary.md || (echo "demo_summary.md not found" && exit 1)

      - name: Collect training data (join triggers + feedback)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          TRAINING_JOIN_WINDOW_MIN: "5"
        run: python -m src.ml.training_data


      # .github/workflows/ci-tests.yml  (add after demo summary build step)
      - name: Retrain from training_data.jsonl (v0.5.0)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODEL_VERSION: "v0.5.0"
          TRAIN_LOG_PATH: "${{ github.workspace }}/models/training_data.jsonl"
        run: |
          python -m src.ml.retrain_from_log
          echo "Wrote versioned artifacts to models/${MODEL_VERSION}"

      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat artifacts/demo_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload demo-summary artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
