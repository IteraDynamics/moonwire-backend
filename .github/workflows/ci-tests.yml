name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # --- Train trigger likelihood model(s) ---
      - name: Train trigger likelihood models (logistic)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"          # seed-friendly for CI
        run: |
          python -m src.ml.train_trigger_model --days 14 --interval hour
          echo "Models in ./models:"
          ls -lah models || true

      # --- Assert logistic artifacts exist (fail early if missing) ---
      - name: Assert logistic artifacts exist
        if: ${{ success() }}
        run: |
          test -f models/trigger_likelihood_v0.joblib    || (echo "missing logistic model" && exit 1)
          test -f models/trigger_likelihood_v0.meta.json || (echo "missing logistic meta"  && exit 1)

      # --- Upload logistic artifacts (non-versioned) ---
      - name: Upload logistic model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
          if-no-files-found: error
          retention-days: 14

      # --- Build/refresh training_data.jsonl by joining trigger history + feedback ---
      - name: Build training data from logs (join)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"              # seed demo rows if logs empty
          TRAINING_JOIN_WINDOW_MIN: "5"  # ±5 min join window
        run: |
          python -m src.ml.training_data
          echo "Training data status:"
          wc -l models/training_data.jsonl || true
          tail -n 3 models/training_data.jsonl || true

      # --- Retrain from training_data.jsonl (versioned artifacts) ---
      - name: Retrain from training data (v0.5.1)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODEL_VERSION: "v0.5.1"
          TRAIN_LOG_PATH: "models/training_data.jsonl"
          SAVE_MODEL_DIR: "models"
        run: |
          python -m src.ml.retrain_from_log --train-log "$TRAIN_LOG_PATH" --save-dir "$SAVE_MODEL_DIR" --version "$MODEL_VERSION" || true
          echo "Retrained artifacts (if any):"
          ls -lah models || true
          ls -lah "models/$MODEL_VERSION" || true

      # --- Upload retrained artifacts (versioned) ---
      - name: Upload retrained model artifacts (v0.5.1)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v051
          path: |
            models/v0.5.1/**
          if-no-files-found: warn
          retention-days: 14

      # --- Prepare & build CI demo summary ---
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      # --- Debug env (no secrets printed) ---
      - name: Debug env
        if: ${{ success() }}
        run: |
          python - <<'PY'
          import os
          print("MW_DEMO =", os.getenv("MW_DEMO"))
          print("DEMO_MODE =", os.getenv("DEMO_MODE"))
          print("Has CoinGecko API key? ->", bool(os.getenv("MW_CG_API_KEY")))
          print("MW_CG_BASE_URL =", os.getenv("MW_CG_BASE_URL"))
          print("MW_REDDIT_MODE =", os.getenv("MW_REDDIT_MODE"))
          print("MW_REDDIT_SUBS =", os.getenv("MW_REDDIT_SUBS"))
          PY

      # --- Market Context: LIVE (CoinGecko) ---
      - name: Build Market Context artifacts (live)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MW_DEMO: "false"
          MW_CG_API_KEY: ${{ secrets.MW_CG_API_KEY }}
          MW_CG_BASE_URL: "https://api.coingecko.com/api/v3"
          MW_CG_COINS: "bitcoin,ethereum,solana"
          MW_CG_VS_CURRENCY: "usd"
          MW_CG_LOOKBACK_H: "72"
          MW_CG_RATE_LIMIT_PER_MIN: "25"
          MPLBACKEND: "Agg"
        run: python scripts/mw_build_market_context.py

      # --- Reddit Lite Ingest: LIVE via RSS (no auth) ---
      - name: Ingest Reddit (RSS live)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MW_DEMO: "false"
          MW_REDDIT_MODE: "rss"
          MW_REDDIT_SUBS: "CryptoCurrency,Bitcoin,ethtrader,Solana"
          MW_REDDIT_SORT: "new"
          MW_REDDIT_LOOKBACK_H: "72"
          MPLBACKEND: "Agg"
        run: |
          python -m scripts.social.reddit_lite_ingest
          echo "Reddit artifacts:"
          ls -lah artifacts || true
          echo "Reddit models:"
          ls -lah models || true
          echo "Reddit logs:"
          ls -lah logs || true

      # --- Build CI summary (includes Market, Social, Calibration) ---
      - name: Build CI summary (markdown)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MW_DEMO: "false"                 # show live data
          DEMO_RICH_SCORES: "true"
          TL_DRIFT_Z_THRESHOLD: "0.5"
          TL_DRIFT_PER_FEATURE_PENALTY: "0.1"
          METRICS_MIN_LABELS: "5"
          METRICS_LOOKBACK_HOURS: "72"
          METRICS_MIN_LABELS_ORIGIN: "3"
          TL_LOG_FALLBACK_ORIGIN: "rss_news"
          MW_ACCURACY_WINDOW_H: "72"
          MW_CAL_WINDOW_H: "72"
          MW_CAL_BINS: "10"
          MW_CAL_MIN_LABELS: "50"
          MW_CAL_MAX_ECE: "0.06"
        run: python scripts/mw_demo_summary.py

      # --- Upload JSON artifacts produced by summary sections ---
      - name: Upload market context JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: market-context
          path: models/market_context.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Reddit social context JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: social-reddit-context
          path: models/social_reddit_context.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Reddit plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: reddit-plots
          path: |
            artifacts/reddit_activity_*.png
            artifacts/reddit_bursts_*.png
          if-no-files-found: ignore
          retention-days: 14

      # --- Existing uploads (quality, calibration, etc.) ---
      - name: Upload calibration reliability plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-reliability-plots
          path: artifacts/calibration_trend_*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload other plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 14

      # --- Publish CI summary to GitHub Summary UI ---
      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/demo_summary.md >> "$GITHUB_STEP_SUMMARY"