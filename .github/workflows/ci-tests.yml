name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1) grab your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) install Python 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4) install both prod + dev deps
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      # 5) run your tests
      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # 6) build demo summary (only if tests passed)
      - name: Build demo summary (read-only)
        if: ${{ success() }}
        run: python scripts/mw_demo_summary.py

      # 7) publish CI summary + upload artifact
      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat artifacts/demo_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*