name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # --- Train trigger likelihood models (post-tests, demo-safe) ---
      - name: Train trigger likelihood v0 (smoke)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"    # allow seeding if logs are empty in CI
        run: |
          python - <<'PY'
          from src.ml.train_trigger_model import train
          out = train(days=14, interval="hour")
          print("v0 trained:", out)
          PY

      - name: Train ensemble v0.3 (best-effort)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"
        run: |
          python - <<'PY'
          try:
              from src.ml.train_trigger_ensemble import train_ensemble
              meta = train_ensemble(days=14, interval="hour")
              print("ensemble trained:", meta)
          except Exception as e:
              print("Ensemble training skipped:", e)
          PY

      - name: Show model dir (debug)
        if: ${{ success() }}
        run: ls -lah models || true

      - name: Upload model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
            models/feature_coverage.json
            models/trigger_likelihood_rf.joblib
            models/trigger_likelihood_gb.joblib
            models/ensemble_meta.json
          if-no-files-found: warn
          retention-days: 14

      # --- Demo summary & artifacts (read-only, post-tests) ---
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      - name: Build demo summary (read-only)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"          # enable demo seeding when logs are empty
          MPLBACKEND: "Agg"          # headless matplotlib
          DEMO_RICH_SCORES: "true"   # richer ML scoring block in summary
        run: python scripts/mw_demo_summary.py

      - name: Show artifacts (debug)
        if: ${{ success() }}
        run: |
          echo "Artifacts in repo root:"
          ls -lah
          echo "Artifacts in ./artifacts:"
          ls -lah artifacts || true
          test -f artifacts/demo_summary.md || (echo "demo_summary.md not found" && exit 1)

      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat artifacts/demo_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload demo summary artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14