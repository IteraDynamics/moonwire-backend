      # --- NEW: Influence Graph artifacts ---
      - name: Upload influence-graph JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: influence-graph
          path: models/influence_graph.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload influence-graph plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: influence-graph-plots
          path: |
            artifacts/influence_graph.png
            artifacts/influence_bar.png
            artifacts/influence_graph.gexf
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload influence-graph CSVs
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: influence-graph-csv
          path: |
            models/influence_edges.csv
            models/influence_nodes.csv
          if-no-files-found: ignore
          retention-days: 14

