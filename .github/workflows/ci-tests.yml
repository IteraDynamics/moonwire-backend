name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # --- Train trigger likelihood model(s) ---
      - name: Train trigger likelihood models (logistic)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"          # seed-friendly for CI
        run: |
          python -m src.ml.train_trigger_model --days 14 --interval hour
          echo "Models in ./models:"
          ls -lah models || true

      # --- Assert logistic artifacts exist ---
      - name: Assert logistic artifacts exist
        if: ${{ success() }}
        run: |
          test -f models/trigger_likelihood_v0.joblib    || (echo "missing logistic model" && exit 1)
          test -f models/trigger_likelihood_v0.meta.json || (echo "missing logistic meta"  && exit 1)

      # --- Upload logistic artifacts (non-versioned) ---
      - name: Upload logistic model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
          if-no-files-found: error
          retention-days: 14

      # --- Build/refresh training_data.jsonl by joining trigger history + feedback ---
      - name: Build training data from logs (join)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"              # seed demo rows if logs empty
          TRAINING_JOIN_WINDOW_MIN: "5"  # ±5 min join window
        run: |
          python -m src.ml.training_data
          echo "Training data status:"
          wc -l models/training_data.jsonl || true
          tail -n 3 models/training_data.jsonl || true

      # --- Retrain from training_data.jsonl (versioned artifacts) ---
      - name: Retrain from training data (v0.5.1)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODEL_VERSION: "v0.5.1"
          TRAIN_LOG_PATH: "models/training_data.jsonl"
          SAVE_MODEL_DIR: "models"
        run: |
          python -m src.ml.retrain_from_log --train-log "$TRAIN_LOG_PATH" --save-dir "$SAVE_MODEL_DIR" --version "$MODEL_VERSION" || true
          echo "Retrained artifacts (if any):"
          ls -lah models || true
          ls -lah "models/$MODEL_VERSION" || true

      # --- Upload retrained artifacts (versioned) ---
      - name: Upload retrained model artifacts (v0.5.1)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v051
          path: |
            models/v0.5.1/**
          if-no-files-found: warn
          retention-days: 14

      # --- Prep artifacts dir for summary build ---
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      # --- Debug env (no secrets printed) ---
      - name: Debug env
        if: ${{ success() }}
        run: |
          python - <<'PY'
          import os
          print("DEMO_MODE =", os.getenv("DEMO_MODE"))
          print("MW_PERF_MODE =", os.getenv("MW_PERF_MODE"))
          PY

      # --- Build demo summary (read-only orchestrator) ---
      - name: Build demo summary (read-only)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"
          MW_DEMO: "false"
          MPLBACKEND: "Agg"
          # Performance validation knobs
          MW_PERF_MODE: "backtest"
          MW_PERF_SYMBOLS: "BTC,ETH,SOL"
          MW_PERF_HORIZON_MIN: "60"
          MW_PERF_SLIPPAGE_BPS: "2"
          MW_PERF_FEES_BPS: "1"
          MW_PERF_CAPITAL: "100000"
          MW_PERF_RISK_FREE: "0.0"
          MW_PERF_LOOKBACK_H: "72"
          # --- pass run URL for deep links ---
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/mw_demo_summary.py

      # --- Upload performance artifacts ---
      - name: Upload performance metrics JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: models/performance_metrics.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload performance plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: performance-plots
          path: |
            artifacts/perf_equity_curve.png
            artifacts/perf_drawdown.png
            artifacts/perf_returns_hist.png
            artifacts/perf_by_symbol_bar.png
          if-no-files-found: ignore
          retention-days: 14

      # --- Show artifacts & publish summary ---
      - name: Show artifacts (debug)
        if: ${{ success() }}
        run: |
          echo "Artifacts in ./artifacts:"
          ls -lah artifacts || true
          echo "Models in ./models:"
          ls -lah models || true
          test -f artifacts/demo_summary.md || (echo "demo_summary.md not found" && exit 1)

      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/demo_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo-summary artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
