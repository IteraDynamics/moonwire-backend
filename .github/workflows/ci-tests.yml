name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # -------------------------------
      # Train trigger likelihood models
      # -------------------------------
      - name: Train trigger likelihood models (logistic)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"          # seed-friendly for CI
        run: |
          python -m src.ml.train_trigger_model --days 14 --interval hour
          echo "Models in ./models:"
          ls -lah models || true

      - name: Assert logistic artifacts exist
        if: ${{ success() }}
        run: |
          test -f models/trigger_likelihood_v0.joblib    || (echo "missing logistic model" && exit 1)
          test -f models/trigger_likelihood_v0.meta.json || (echo "missing logistic meta"  && exit 1)

      - name: Upload logistic model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
          if-no-files-found: error
          retention-days: 14

      # -------------------------------
      # Build/refresh training_data.jsonl
      # -------------------------------
      - name: Build training data from logs (join)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"              # seed demo rows if logs empty
          TRAINING_JOIN_WINDOW_MIN: "5"  # ±5 min join window
        run: |
          python -m src.ml.training_data
          echo "Training data status:"
          wc -l models/training_data.jsonl || true
          tail -n 3 models/training_data.jsonl || true

      - name: Retrain from training data (v0.5.1)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          MODEL_VERSION: "v0.5.1"
          TRAIN_LOG_PATH: "models/training_data.jsonl"
          SAVE_MODEL_DIR: "models"
        run: |
          python -m src.ml.retrain_from_log --train-log "$TRAIN_LOG_PATH" --save-dir "$SAVE_MODEL_DIR" --version "$MODEL_VERSION" || true
          echo "Retrained artifacts (if any):"
          ls -lah models || true
          ls -lah "models/$MODEL_VERSION" || true

      - name: Upload retrained model artifacts (v0.5.1)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v051
          path: |
            models/v0.5.1/**
          if-no-files-found: warn
          retention-days: 14

      # -------------------------------
      # Prep artifacts dir
      # -------------------------------
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      # -------------------------------
      # Debug env (no secrets printed)
      # -------------------------------
      - name: Debug env for context steps
        if: ${{ success() }}
        run: |
          python - <<'PY'
          import os
          print("MW_DEMO         =", os.getenv("MW_DEMO"))
          print("DEMO_MODE       =", os.getenv("DEMO_MODE"))
          print("MW_CG_BASE_URL  =", os.getenv("MW_CG_BASE_URL"))
          print("Has PRO key?    =", bool(os.getenv("MW_CG_API_KEY")))
          print("Has DEMO key?   =", bool(os.getenv("MW_CG_DEMO_API_KEY")))
          print("MW_REDDIT_MODE  =", os.getenv("MW_REDDIT_MODE"))
          print("MW_REDDIT_SUBS  =", os.getenv("MW_REDDIT_SUBS"))
          PY

      # -------------------------------
      # Build Market Context artifacts
      # -------------------------------
      - name: Build Market Context (CoinGecko)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Use demo-friendly path by default; switch to live by setting MW_DEMO="false" and adding keys.
          MW_DEMO: "false"
          # If you only have demo key: set MW_CG_DEMO_API_KEY repo secret. Leave MW_CG_API_KEY empty.
          MW_CG_API_KEY: ${{ secrets.MW_CG_API_KEY }}
          MW_CG_DEMO_API_KEY: ${{ secrets.MW_CG_DEMO_API_KEY }}
          MW_CG_BASE_URL: "https://api.coingecko.com/api/v3"
          MW_CG_COINS: "bitcoin,ethereum,solana"
          MW_CG_VS_CURRENCY: "usd"
          MW_CG_LOOKBACK_H: "72"
          MW_CG_RATE_LIMIT_PER_MIN: "25"
          MPLBACKEND: "Agg"
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.market import ingest_market as ing
          paths = ing.IngestPaths(
              logs_dir=Path("logs"),
              models_dir=Path("models"),
              artifacts_dir=Path("artifacts"),
          )
          out = ing.run_ingest(paths=paths)
          print("Market Context build:", out)
          PY

      # -------------------------------
      # Build Reddit Social Context artifacts
      # -------------------------------
      - name: Build Social Context — Reddit (lite)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"                       # demo-safe by default; flip to false to hit network
          MW_REDDIT_MODE: "rss"                   # rss|api
          MW_REDDIT_SUBS: "CryptoCurrency,Bitcoin,ethtrader,Solana"
          MW_REDDIT_SORT: "new"
          MW_REDDIT_LOOKBACK_H: "72"
          MW_REDDIT_RATE_LIMIT_PER_MIN: "60"
          # Optional for API mode:
          MW_REDDIT_CLIENT_ID: ${{ secrets.MW_REDDIT_CLIENT_ID }}
          MW_REDDIT_CLIENT_SECRET: ${{ secrets.MW_REDDIT_CLIENT_SECRET }}
          MPLBACKEND: "Agg"
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.social import reddit_lite_ingest as rli
          paths = rli.IngestPaths(
              logs_dir=Path("logs"),
              models_dir=Path("models"),
              artifacts_dir=Path("artifacts"),
          )
          out = rli.run_ingest(paths=paths)
          print("Reddit Social Context build:", out)
          PY

      # -------------------------------
      # Build CI demo summary (markdown)
      # -------------------------------
      - name: Build CI summary markdown
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"              # keep other sections seed-friendly for CI
          # Keep market live/demo behavior from earlier step:
          MW_DEMO: "false"
          MW_CG_API_KEY: ${{ secrets.MW_CG_API_KEY }}
          MW_CG_DEMO_API_KEY: ${{ secrets.MW_CG_DEMO_API_KEY }}
          MW_CG_BASE_URL: "https://api.coingecko.com/api/v3"
          MPLBACKEND: "Agg"
          DEMO_RICH_SCORES: "true"
          # knobs for visibility in CI
          TL_DRIFT_Z_THRESHOLD: "0.5"
          TL_DRIFT_PER_FEATURE_PENALTY: "0.1"
          METRICS_MIN_LABELS: "5"
          METRICS_LOOKBACK_HOURS: "72"
          METRICS_MIN_LABELS_ORIGIN: "3"
          TL_LOG_FALLBACK_ORIGIN: "rss_news"
          # accuracy-by-version snapshot
          MW_ACCURACY_WINDOW_H: "72"
          # calibration & reliability defaults
          MW_CAL_WINDOW_H: "72"
          MW_CAL_BINS: "10"
          MW_CAL_MIN_LABELS: "50"
          MW_CAL_MAX_ECE: "0.06"
          # calibration trend: dim + window/bucket knobs
          MW_CAL_TREND_WINDOW_H: "72"
          MW_CAL_TREND_BUCKET_MIN: "120"
          MW_CAL_TREND_DIM: "origin"
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          # Reddit again for summary module (reads models/social_reddit_context.json)
          MW_REDDIT_MODE: "rss"
          MW_REDDIT_SUBS: "CryptoCurrency,Bitcoin,ethtrader,Solana"
          MW_REDDIT_LOOKBACK_H: "72"
        run: python scripts/mw_demo_summary.py

      # -------------------------------
      # Upload JSON artifacts (selected)
      # -------------------------------
      - name: Upload accuracy-by-version snapshot
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-by-version
          path: models/accuracy_by_version.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload signal quality summary
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: signal-quality-summary
          path: models/signal_quality_summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload per-origin signal quality
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: signal-quality-per-origin
          path: models/signal_quality_per_origin.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload per-version signal quality
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: signal-quality-per-version
          path: models/signal_quality_per_version.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload trigger coverage per origin
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-coverage-per-origin
          path: models/trigger_coverage_per_origin.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload trigger precision by origin
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-precision-by-origin
          path: models/trigger_precision_by_origin.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload suppression rate per origin
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: suppression-rate-per-origin
          path: models/suppression_rate_per_origin.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload threshold quality per origin
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: threshold-quality-per-origin
          path: models/threshold_quality_per_origin.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload threshold recommendations
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: threshold-recommendations
          path: models/threshold_recommendations.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload threshold backtest
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: threshold-backtest
          path: models/threshold_backtest.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload threshold auto-apply audit
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: threshold-auto-apply
          path: models/threshold_auto_apply.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload calibration reliability JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-reliability
          path: models/calibration_reliability.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload calibration trend JSON (enriched w/ market + social)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-trend
          path: models/calibration_reliability_trend.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload market context JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: market-context
          path: models/market_context.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload social Reddit context JSON
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: social-reddit-context
          path: models/social_reddit_context.json
          if-no-files-found: ignore
          retention-days: 14

      # -------------------------------
      # Upload plot artifacts
      # -------------------------------
      - name: Upload calibration reliability plots
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-reliability-plots
          path: artifacts/cal_reliability_*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload calibration trend plots (with overlays)
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: calibration-trend-plots
          path: |
            artifacts/calibration_trend_ece.png
            artifacts/calibration_trend_brier.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload market trend charts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: market-trends
          path: |
            artifacts/market_trend_price_*.png
            artifacts/market_trend_returns_*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Reddit activity/bursts charts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: reddit-trends
          path: |
            artifacts/reddit_activity_*.png
            artifacts/reddit_bursts_*.png
          if-no-files-found: ignore
          retention-days: 14

      # -------------------------------
      # Show artifacts & publish summary
      # -------------------------------
      - name: Show artifacts (debug)
        if: ${{ success() }}
        run: |
          echo "Artifacts in repo root:"
          ls -lah
          echo "Artifacts in ./artifacts:"
          ls -lah artifacts || true
          echo "Models in ./models:"
          ls -lah models || true
          test -f artifacts/demo_summary.md || (echo "demo_summary.md not found" && exit 1)

      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/demo_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo-summary artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
