name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ --maxfail=1 --disable-warnings -q

      # --- Train trigger likelihood model (smoke) ---
      - name: Train trigger likelihood model (smoke)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"        # allow seeding if logs are empty in CI
        run: |
          python -m src.ml.train_trigger_model --days 14 --interval hour
          echo "Models in ./models:"
          ls -lah models || true

      - name: Upload model artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: trigger-likelihood-v0
          path: |
            models/trigger_likelihood_v0.joblib
            models/trigger_likelihood_v0.meta.json
          if-no-files-found: warn
          retention-days: 14

      # --- Demo summary & artifacts (read-only, post-tests) ---
      - name: Prep artifacts dir
        if: ${{ success() }}
        run: mkdir -p artifacts

      - name: Build demo summary (read-only)
        if: ${{ success() }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEMO_MODE: "true"          # <- enable demo seeding when no reviewers present
          MPLBACKEND: "Agg"          # <- safe, headless matplotlib backend
          DEMO_RICH_SCORES: "true"   # turn on richer ML scoring (safe to omit = off)
        run: python scripts/mw_demo_summary.py

      - name: Show artifacts (debug)
        if: ${{ success() }}
        run: |
          echo "Artifacts in repo root:"
          ls -lah
          echo "Artifacts in ./artifacts:"
          ls -lah artifacts || true
          test -f artifacts/demo_summary.md || (echo "demo_summary.md not found" && exit 1)

      - name: Publish CI summary
        if: ${{ success() }}
        run: |
          echo "## MoonWire CI Demo Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat artifacts/demo_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: moonwire-demo
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
