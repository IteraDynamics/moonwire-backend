name: Paper from Shadow

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols to probe"
        required: false
        default: "BTC,ETH"
      lookback_h:
        description: "Lookback hours for converting signals → shadow (optional)"
        required: false
        default: "72"
      backfill_run_id:
        description: "Specific run id of Backfill ML Shadow to pull (optional)"
        required: false
        default: ""

jobs:
  paper:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MPLBACKEND: Agg
      # Paper trader knobs
      MW_PERF_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
      MW_PERF_LOOKBACK_H: "720"
      MW_PERF_HORIZON_MIN: "180"
      MW_PERF_SLIPPAGE_BPS: "2"
      MW_PERF_FEES_BPS: "1"
      MW_PERF_CAPITAL: "100000"
      MW_PERF_FORCE_DEMO: "false"
      MW_PERF_DEADBAND: "0.08"
      MW_PERF_MIN_FLIP_MIN: "360"
      REPLAY_CONF_MIN: "0.58"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          python -m pip install matplotlib

      # ---------- Ensure we have an inference bundle (per-symbol aware) ----------
      - name: Ensure inference bundle (reuse or build)
        env:
          MW_ML_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
          MW_ML_LOOKBACK_DAYS: "180"
          MW_ML_MODEL: "gb"
          MW_PER_SYMBOL_MODELS: "1"
          MW_HORIZON_H: "1"
          MW_SOCIAL_ENABLED: "1"
          MW_SOCIAL_INCLUDE: ""
          MW_FAIL_ON_DEMO: "0"
          MW_BRANCH: ${{ github.ref_name }}
          MW_PROTECTED_PATTERN: "^main$"
        run: |
          set -euo pipefail
          echo "Checking for model bundles under models/current/…"
          found_any=""
          shopt -s globstar || true
          for f in models/current/**/model.joblib models/current/model.joblib; do
            if [ -f "$f" ]; then found_any="yes"; break; fi
          done
          if [ -z "$found_any" ]; then
            echo "No model bundles found — training locally…"
            python -m scripts.ml.train_predict
          else
            echo "✅ Found existing model bundles:"
            find models/current -maxdepth 2 -type f -name "model.joblib" || true
          fi

      # ---------- Generate a few fresh ML shadow rows (probe with model) ----------
      - name: Generate ML shadow rows (probe with model)
        env:
          MW_SHADOW_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
        run: |
          python - <<'PY'
          import os, json
          from pathlib import Path
          from datetime import datetime, timezone
          from src.ml.infer import infer_asset_signal
          from src.signal_generator import load_governance_params

          log = Path("logs/signal_inference_shadow.jsonl")
          log.parent.mkdir(parents=True, exist_ok=True)
          syms = [s.strip().upper() for s in os.getenv("MW_SHADOW_SYMBOLS","BTC,ETH,SOL").split(",") if s.strip()]

          wrote = 0
          for s in syms:
              try:
                  out = infer_asset_signal(s)
                  rec = {
                      "symbol": s,
                      "reason": "paper-shadow",
                      "ml_ok": True,
                      "ml_dir": out.get("direction"),
                      "ml_conf": float(out.get("confidence", 0.0) or 0.0),
                      "ts": datetime.now(timezone.utc).isoformat(),
                      "gov": load_governance_params(s),
                  }
              except Exception as e:
                  rec = {
                      "symbol": s,
                      "reason": f"ml_exception:{type(e).__name__}",
                      "ml_ok": False, "ml_dir": None, "ml_conf": None,
                      "ts": datetime.now(timezone.utc).isoformat(),
                  }
              with log.open("a", encoding="utf-8") as f:
                  f.write(json.dumps(rec) + "\n")
              wrote += 1
          print(f"[shadow] wrote {wrote} ML shadow row(s) → {log}")
          PY

      # ---------- Pull the backfilled shadow log artifact into logs/incoming ----------
      - name: Download backfilled shadow log (latest success)
        if: ${{ github.event.inputs.backfill_run_id == '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          repository: ${{ github.repository }}
          workflow: Backfill ML Shadow           # <<< workflow *name* (from that file's `name:`)
          branch: main
          workflow_conclusion: success
          name: ml-shadow-backfill               # <<< artifact name in Backfill workflow
          path: logs/incoming
          allow_forks: true
          if_no_artifact_found: warn

      - name: Download backfilled shadow log by run id (optional)
        if: ${{ github.event.inputs.backfill_run_id != '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event.inputs.backfill_run_id }}
          repo: ${{ github.repository }}
          name: ml-shadow-backfill
          path: logs/incoming
          if_no_artifact_found: warn

      # ---------- Merge downloaded shadows into canonical log ----------
      - name: Merge downloaded shadow artifacts
        run: |
          python - <<'PY'
          import pathlib
          root = pathlib.Path("logs")
          incoming = root / "incoming"
          out = root / "signal_inference_shadow.jsonl"
          out.parent.mkdir(parents=True, exist_ok=True)

          merged = 0
          if incoming.exists():
              # merge any *.jsonl files from artifact tree
              for p in incoming.rglob("*.jsonl"):
                  try:
                      txt = p.read_text(encoding="utf-8")
                  except Exception:
                      continue
                  if txt.strip():
                      with out.open("a", encoding="utf-8") as w:
                          w.write(txt if txt.endswith("\n") else txt + "\n")
                      merged += 1
          print(f"[merge] merged {merged} backfill shadow file(s) into {out}")
          PY

      - name: Show shadow file status
        run: |
          echo "Contents (recursive) of ./logs:"
          ls -lahR logs || true
          echo "---- tail merged canonical ----"
          tail -n 10 logs/signal_inference_shadow.jsonl || true
          echo "---- line count ----"
          wc -l logs/signal_inference_shadow.jsonl || true

      # ---------- Replay shadow → paper trading ----------
      - name: Replay shadow → paper trading
        env:
          SHADOW_LOG: logs/signal_inference_shadow.jsonl   # ensure replay reads the merged file
        run: |
          python -m scripts.perf.replay_shadow_to_paper
          echo "Trades (tail):"
          tail -n 5 logs/paper_trades.jsonl || true
          echo "Performance summary:"
          test -f models/performance_metrics.json && cat models/performance_metrics.json || echo "no performance_metrics.json"

      # ---------- Upload artifacts ----------
      - name: Upload paper artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-artifacts
          if-no-files-found: warn
          path: |
            logs/signal_inference_shadow.jsonl
            logs/paper_trades.jsonl
            models/performance_metrics.json
            artifacts/perf_*.png

      - name: Write summary
        run: |
          {
            echo "### 🕵️ Paper from Shadow";
            echo "";
            echo "**Symbols:** \`${{ env.MW_PERF_SYMBOLS }}\`";
            echo "";
            echo "**Replay config:**";
            echo "";
            echo "- LOOKBACK_H: \`${{ env.MW_PERF_LOOKBACK_H }}\`";
            echo "- HORIZON_MIN: \`${{ env.MW_PERF_HORIZON_MIN }}\`";
            echo "- DEADBAND: \`${{ env.MW_PERF_DEADBAND }}\`";
            echo "- MIN_FLIP_MIN: \`${{ env.MW_PERF_MIN_FLIP_MIN }}\`";
            echo "- REPLAY_CONF_MIN: \`${{ env.REPLAY_CONF_MIN }}\`";
            echo "- FEES_BPS / SLIPPAGE_BPS: \`${{ env.MW_PERF_FEES_BPS }} / ${{ env.MW_PERF_SLIPPAGE_BPS }}\`";
            echo "";
            echo "**Shadow tail:**";
            echo '```json';
            tail -n 5 logs/signal_inference_shadow.jsonl || true
            echo '```';
            echo "";
            echo "**Paper trades tail:**";
            echo '```json';
            tail -n 5 logs/paper_trades.jsonl || true
            echo '```';
            echo "";
            if [ -f models/performance_metrics.json ]; then
              echo "**Performance metrics:**";
              echo '```json';
              cat models/performance_metrics.json
              echo '```';
            else
              echo "_No performance_metrics.json produced_";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      