# .github/workflows/paper-shadow.yml
name: Paper from Shadow

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch: {}

jobs:
  paper:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Install plotting dependency (matplotlib)
        run: python -m pip install --upgrade pip && python -m pip install matplotlib
      - name: Set headless Matplotlib
        run: echo "MPLBACKEND=Agg" >> $GITHUB_ENV
      
      - run: python -m scripts.perf.replay_shadow_to_paper
      - uses: actions/upload-artifact@v4
        with:
          name: paper-from-shadow
          path: artifacts/paper_*
          if-no-files-found: warn
