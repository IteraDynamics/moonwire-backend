name: Shadow Inference

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to pull bundle from"
        required: false
        default: ""
      symbols:
        description: "Comma-separated symbols"
        required: false
        default: "BTC,ETH,SOL"

jobs:
  shadow:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}
      MW_INFER_ENABLE: "1"     # allow ML in shadow
      MW_INFER_SHADOW_ONLY: "1"
      MW_INFER_LIVE: "0"
      MW_SHADOW_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Find latest successful ci-tests run on this branch
      - name: Resolve latest ci-tests run-id
        id: findrun
        uses: actions/github-script@v7
        with:
          script: |
            const branch = core.getInput('branch') || context.ref.replace('refs/heads/','');
            const wfName = "CI";
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch,
              status: 'success',
              per_page: 50
            });
            const found = runs.data.workflow_runs.find(r => r.name === wfName);
            if (!found) core.setFailed(`No successful '${wfName}' run found on branch '${branch}'.`);
            core.setOutput('run_id', found.id.toString());
          result-encoding: string

      - name: Download inference bundle from CI run
        uses: actions/download-artifact@v4
        with:
          name: inference-bundle-current
          path: models/current
          repository: ${{ github.repository }}
          run-id: ${{ steps.findrun.outputs.run_id }}

      - name: Show bundle
        run: |
          ls -lah models/current || true
          echo "manifest.json head:"
          head -n 50 models/current/manifest.json || true

      - name: Shadow probe (symbols)
        run: |
          python - <<'PY'
          import os
          from src.signal_generator import shadow_probe
          syms = [s.strip() for s in os.getenv("MW_SHADOW_SYMBOLS","BTC").split(",") if s.strip()]
          shadow_probe(syms)
          print("wrote ci_probe lines to logs/signal_inference_shadow.jsonl")
          PY

      - name: Summarize shadow tail
        run: |
          python - <<'PY'
          import os, json, itertools
          p = "logs/signal_inference_shadow.jsonl"
          if not os.path.exists(p):
              print("no shadow log")
          else:
              tail = list(itertools.islice(open(p,"r",encoding="utf-8"), 1000000))[-10:]
              print("🕵️ Shadow Inference (tail)")
              for ln in tail:
                  try:
                      j = json.loads(ln)
                      print(" ", json.dumps(j, ensure_ascii=False))
                  except:
                      print(" ", ln.strip())
          PY

      - name: Upload shadow log
        uses: actions/upload-artifact@v4
        with:
          name: inference-shadow
          path: logs/signal_inference_shadow.jsonl
          if-no-files-found: warn