name: Shadow Inference

on:
  # ✅ makes the "Run workflow" button appear
  workflow_dispatch:
    inputs:
      branch:
        description: "Repo branch to checkout (default: this workflow's ref)"
        required: false
        default: ""
      ci_run_id:
        description: "CI run id to pull inference-bundle-current from (optional)"
        required: false
        default: ""
      symbols:
        description: "Comma-separated symbols for the probe"
        required: false
        default: "BTC,ETH,SOL"

  # Optional hourly auto-run (safe to keep or remove)
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  actions: read

jobs:
  shadow:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}
      MW_INFER_LIVE: "0"            # shadow only
      MW_INFER_SHADOW_ONLY: "1"
      MW_SOCIAL_ENABLED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # allow running against a chosen branch from the UI
          ref: ${{ inputs.branch != '' && inputs.branch || github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt || true
          python -m pip install -r requirements-dev.txt || true

      # ---------- OPTIONAL: pull trained bundle from a CI run ----------
      - name: Try download inference bundle (if run-id provided)
        if: ${{ inputs.ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.ci_run_id }}
          name: inference-bundle-current
          path: models/current

      - name: Verify bundle (optional)
        run: |
          echo "Listing models/current (if any):"
          ls -lah models/current || echo "models/current missing (shadow will still write probe lines)"

      # ---------- Shadow probe ----------
      - name: Shadow probe (write JSONL)
        run: |
          python - <<'PY'
          import os
          from src.signal_generator import shadow_probe
          syms = [s.strip().upper() for s in (os.getenv("SYMS","BTC,ETH,SOL")).split(",") if s.strip()]
          shadow_probe(syms)   # note: no 'reason' kwarg in signature
          print("shadow_probe wrote records for:", ",".join(syms))
          PY
        env:
          SYMS: ${{ inputs.symbols }}

      - name: Tail shadow log
        run: |
          echo "### Shadow tail"
          test -f logs/signal_inference_shadow.jsonl && tail -n 5 logs/signal_inference_shadow.jsonl || echo "no shadow log"

      - name: Upload inference shadow
        uses: actions/upload-artifact@v4
        with:
          name: inference-shadow
          path: logs/signal_inference_shadow.jsonl
          if-no-files-found: warn