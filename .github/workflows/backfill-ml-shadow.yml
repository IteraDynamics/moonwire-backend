name: Backfill ML Shadow

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols"
        required: false
        default: "BTC,ETH,SOL"
      days:
        description: "Lookback days"
        required: false
        default: "180"
      include_all:
        description: "Write all rows (ignore conf_min gating)?"
        required: false
        default: "true"
      conf_min_override:
        description: "Override conf_min for gating (blank = use governance)"
        required: false
        default: ""
      ci_run_id:
        description: "(Optional) CI run_id to fetch inference bundle from; leave empty to use latest successful"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MPLBACKEND: Agg
      MW_BUNDLE_DIR: models/current
      MW_BACKFILL_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
      MW_BACKFILL_DAYS: ${{ github.event.inputs.days || '180' }}
      MW_BACKFILL_INCLUDE_ALL: ${{ github.event.inputs.include_all || 'true' }}
      MW_BACKFILL_CONF_MIN_OVERRIDE: ${{ github.event.inputs.conf_min_override }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      # --- Ensure we have an inference bundle in models/current ---
      - name: Detect local bundle
        id: have_bundle
        run: |
          if [ -f models/current/model.joblib ] && [ -f models/current/manifest.json ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Download bundle from latest successful CI (fallback)
        if: steps.have_bundle.outputs.found == 'false' && (github.event.inputs.ci_run_id == '' || github.event.inputs.ci_run_id == null)
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: CI
          name: inference-bundle-current
          path: _dl_bundle
          workflow_conclusion: success
          # optionally restrict to main if you like:
          # branch: main

      - name: Download bundle from a specific CI run (fallback)
        if: steps.have_bundle.outputs.found == 'false' && github.event.inputs.ci_run_id != ''
        uses: dawidd6/action-download-artifact@v3
        with:
          run_id: ${{ github.event.inputs.ci_run_id }}
          name: inference-bundle-current
          path: _dl_bundle

      - name: Install downloaded bundle into models/current
        if: steps.have_bundle.outputs.found == 'false'
        run: |
          mkdir -p models/current
          shopt -s nullglob
          # Copy any of: model.joblib, manifest.json, features.json
          for f in _dl_bundle/*; do
            base=$(basename "$f")
            cp "$f" "models/current/$base" || true
          done
          echo "models/current contents:"
          ls -lah models/current || true

      - name: Sanity: show bundle state
        run: |
          ls -lah models/current || true
          test -f models/current/model.joblib || (echo "ERROR: model.joblib missing" && exit 1)
          test -f models/current/manifest.json || (echo "ERROR: manifest.json missing" && exit 1)
          # features.json is optional (we fall back to manifest features)

      - name: Run backfill (write historical shadow rows)
        run: python -m scripts.perf.backfill_ml_shadow

      - name: Show shadow tail
        run: |
          echo "=== tail logs/signal_inference_shadow.jsonl ==="
          tail -n 20 logs/signal_inference_shadow.jsonl || true

      - name: Upload shadow log
        uses: actions/upload-artifact@v4
        with:
          name: ml-shadow-backfill
          path: logs/signal_inference_shadow.jsonl
          if-no-files-found: error

      - name: Summary
        if: always()
        run: |
          echo "### 🧰 Backfill ML Shadow" >> "$GITHUB_STEP_SUMMARY"
          echo "- Symbols: \`${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Days: \`${{ github.event.inputs.days || '180' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Include all: \`${{ github.event.inputs.include_all || 'true' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Conf override: \`${{ github.event.inputs.conf_min_override || '' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Shadow tail:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`json" >> "$GITHUB_STEP_SUMMARY"
          (tail -n 10 logs/signal_inference_shadow.jsonl || true) >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"