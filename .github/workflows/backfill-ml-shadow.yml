name: Backfill ML Shadow

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols"
        required: false
        default: "BTC,ETH,SOL"
      days:
        description: "Lookback days"
        required: false
        default: "180"
      include_all:
        description: "Ignore conf_min gating?"
        required: false
        default: "true"
      conf_min_override:
        description: "Override conf_min (blank = governance)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MW_BACKFILL_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
      MW_BACKFILL_DAYS: ${{ github.event.inputs.days || '180' }}
      MW_BACKFILL_INCLUDE_ALL: ${{ github.event.inputs.include_all || 'true' }}
      MW_BACKFILL_CONF_MIN_OVERRIDE: ${{ github.event.inputs.conf_min_override }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      - name: Assert local bundle exists (models/current)
        run: |
          if [ ! -f models/current/model.joblib ]; then
            echo "models/current/model.joblib missing"; exit 1
          fi
          if [ ! -f models/current/manifest.json ]; then
            echo "models/current/manifest.json missing"; exit 1
          fi
          ls -lah models/current

      - name: Run backfill
        run: python -m scripts.perf.backfill_ml_shadow

      - name: Show shadow tail
        run: |
          echo "=== tail logs/signal_inference_shadow.jsonl ==="
          tail -n 20 logs/signal_inference_shadow.jsonl || true

      - name: Upload shadow log
        uses: actions/upload-artifact@v4
        with:
          name: ml-shadow-backfill
          path: logs/signal_inference_shadow.jsonl
          if-no-files-found: error