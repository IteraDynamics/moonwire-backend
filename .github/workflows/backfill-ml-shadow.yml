name: Backfill ML Shadow

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Comma-separated symbols"
        required: false
        default: "BTC,ETH,SOL"
      days:
        description: "Lookback days"
        required: false
        default: "180"
      include_all:
        description: "Ignore conf_min gating?"
        required: false
        default: "true"
      conf_min_override:
        description: "Override conf_min (blank = governance)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MW_BACKFILL_SYMBOLS: ${{ github.event.inputs.symbols || 'BTC,ETH,SOL' }}
      MW_BACKFILL_DAYS: ${{ github.event.inputs.days || '180' }}
      MW_BACKFILL_INCLUDE_ALL: ${{ github.event.inputs.include_all || 'true' }}
      MW_BACKFILL_CONF_MIN_OVERRIDE: ${{ github.event.inputs.conf_min_override }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi

      # ⬇️ Pull the latest successful CI bundle
      - name: Download bundle from latest successful CI
        uses: dawidd6/action-download-artifact@v3
        with:
          # IMPORTANT: use the *file path* of your CI workflow here
          workflow: .github/workflows/ci-tests.yml
          workflow_conclusion: success
          name: inference-bundle-current
          path: _dl_bundle

      - name: Install downloaded bundle
        run: |
          mkdir -p models/current
          cp -v _dl_bundle/* models/current/ || true
          echo "Bundle contents:"
          ls -lah models/current || true

      - name: Assert local